{% load static %}
{% include "dashboard/header.html" %}

<div class="container mt-4">
    <h2>Editar Paciente</h2>
    <br>
    <form action="{% url 'editar_paciente' paciente.id %}" method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="nombre_completo">Nombre Completo</label>
            <input type="text" class="form-control" id="nombre_completo" name="nombre_completo" value="{{ paciente.nombre_completo }}" required>
        </div>

        <div class="mb-3">
            <label for="cedula">Cédula</label>
            <input type="text" class="form-control" id="cedula" name="cedula" value="{{ paciente.cedula }}" required>
        </div>

        <div class="mb-3">
            <label for="telefono">Número de Teléfono</label>
            <input type="text" class="form-control" id="telefono" name="telefono" value="{{ paciente.telefono|default_if_none:'' }}">
        </div>

        <div class="mb-3">
            <label for="correo">Correo Electrónico</label>
            <input type="email" class="form-control" id="correo" name="correo" value="{{ paciente.correo|default_if_none:'' }}">
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="{% url 'listar_pacientes' %}" class="btn btn-danger">Cancelar</a>
    </form>
</div>

{% include "dashboard/footer.html" %}
