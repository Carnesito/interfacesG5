{% load static %}
{% include "dashboard/header.html" %}

<div class="container mt-4">
    <h2>Registrar Paciente</h2>
    <br>
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
    <form method="POST" action="">
        {% csrf_token %}
        <div class="mb-3">
            <label for="nombre_completo">Nombre Completo</label>
            <input type="text" class="form-control" id="nombre_completo" name="nombre_completo" required placeholder="Ingrese nombre y apellido del paciente">
        </div>

        <div class="mb-3">
            <label for="cedula">Cédula</label>
            <input type="text" class="form-control" id="cedula" name="cedula" required placeholder="Ingrese la cédula de identidad">
        </div>

        <div class="mb-3">
            <label for="telefono">Número de Teléfono</label>
            <input type="text" class="form-control" id="telefono" name="telefono" placeholder="Ej: +56912345678">
        </div>

        <div class="mb-3">
            <label for="correo">Correo Electrónico</label>
            <input type="email" class="form-control" id="correo" name="correo" placeholder="paciente@example.com">
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="{% url 'listar_pacientes' %}" class="btn btn-danger">Cancelar</a>
    </form>
</div>

{% include "dashboard/footer.html" %}
