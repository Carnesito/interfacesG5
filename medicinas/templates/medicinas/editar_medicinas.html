{% load static %}
{% include 'dashboard/header.html' %}

<div class="container mt-4">
    <h2>Editar Medicina</h2>
    <br>
    <form action="{% url 'editar_medicinas' medicina.id %}" method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="nombre_medicina">NUEVO Nombre de la medicina:</label>
            <input type="text" class="form-control" id="nombre_medicina" name="nombre_medicina" value="{{ medicina.nombre_medicina }}" required placeholder="Ingrese el nombre de la medicina">
        </div>
        <div class="mb-3">
            <label for="precio_medicina">NUEVO Precio de la medicina:</label>
            <input type="number" step="0.01" class="form-control" id="precio_medicina" name="precio_medicina" value="{{ medicina.precio_medicina }}" required placeholder="Ingrese el precio de la medicina">
        </div>
        <div class="mb-3">
            <label for="stock_medicina">NUEVO Stock de la medicina:</label>
            <input type="number" class="form-control" id="stock_medicina" name="stock_medicina" value="{{ medicina.stock_medicina }}" required placeholder="Ingrese el stock de la medicina">
        </div>
        <div class="mb-3">
            <label for="estado_medicina">NUEVO Estado de la medicina:</label>
            <select class="form-control" id="estado_medicina" name="estado_medicina" required>
                <option value="">Seleccione un estado</option>
                <option value="Activo" {% if medicina.estado_medicina == "Activo" %}selected{% endif %}>Activo</option>
                <option value="Inactivo" {% if medicina.estado_medicina == "Inactivo" %}selected{% endif %}>Inactivo</option>
            </select>
        </div>
        
        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="{% url 'listar_medicinas' %}" class="btn btn-danger">Cancelar</a>
    </form>
</div>

{% include 'dashboard/footer.html' %}
