{% load static %}
{% include "dashboard/header.html" %}
<div class="container mt-4">
    <h2>Crear Medicina</h2>
    <br>
    <form method="POST" action="">
        {% csrf_token %}
        <div class="mb-3">
            <label for="nombreMedicina">Nombre de la Medicina</label>
            <input type="text" class="form-control" id="nombreMedicina" name="nombreMedicina" required>
        </div>

        <div class="mb-3">
            <label for="precioMedicina">Precio de la Medicina</label>
            <input type="number" step="0.01" class="form-control" id="precioMedicina" name="precioMedicina" required>
        </div>

        <div class="mb-3">
            <label for="stockMedicina">Stock de la Medicina</label>
            <input type="number" class="form-control" id="stockMedicina" name="stockMedicina" required>
        </div>

        <div class="mb-3">
            <label for="estadoMedicina">Estado de la Medicina</label>
            <select class="form-control" id="estadoMedicina" name="estadoMedicina" required>
                <option value="Activo">Activo</option>
                <option value="Inactivo">Inactivo</option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="{% url 'listar_medicinas' %}" class="btn btn-danger">Cancelar</a>
    </form>
</div>
{% include "dashboard/footer.html" %}
