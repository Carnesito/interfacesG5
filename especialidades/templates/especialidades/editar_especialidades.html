{% load static %}
{% include "dashboard/header.html" %}

<div class="container mt-4">
    <h2>Editar Especialidad</h2>
    <br>
    <form action="{% url 'editar_especialidad' especialidad.id %}" method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="nombre">Nombre de la Especialidad</label>
            <input type="text" class="form-control" id="nombre" name="nombre" value="{{ especialidad.nombre }}" required>
        </div>

        <div class="mb-3">
            <label for="descripcion">Descripción</label>
            <textarea class="form-control" id="descripcion" name="descripcion" rows="3">{{ especialidad.descripcion }}</textarea>
        </div>

        <div class="mb-3">
            <label for="costo">Costo de Consulta</label>
            <input type="number" step="0.01" class="form-control" id="costo" name="costo" value="{{ especialidad.costo }}" required>
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="{% url 'listar_especialidades' %}" class="btn btn-danger">Cancelar</a>
    </form>
</div>

{% include "dashboard/footer.html" %}
