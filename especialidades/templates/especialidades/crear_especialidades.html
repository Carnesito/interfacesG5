{% load static %}
{% include "dashboard/header.html" %}

<div class="container mt-4">
    <h2>Crear Especialidad</h2>
    <br>
    <form method="POST" action="">
        {% csrf_token %}
        <div class="mb-3">
            <label for="nombre">Nombre de la Especialidad</label>
            <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Ej: Pediatría, Cardiología" required>
        </div>

        <div class="mb-3">
            <label for="descripcion">Descripción</label>
            <textarea class="form-control" id="descripcion" name="descripcion" rows="3" placeholder="Detalles de la especialidad..."></textarea>
        </div>

        <div class="mb-3">
            <label for="costo">Costo de Consulta</label>
            <input type="number" step="0.01" class="form-control" id="costo" name="costo" placeholder="0.00" required>
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="{% url 'listar_especialidades' %}" class="btn btn-danger">Cancelar</a>
    </form>
</div>

{% include "dashboard/footer.html" %}
