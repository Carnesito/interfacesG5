{% load static %}
{% include "header.html" %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh; margin-top: 130px; margin-bottom: 60px;">
    <div class="card border-0 shadow-lg" style="max-width: 450px; width: 100%; border-radius: 16px; overflow: hidden; background: #ffffff;">
        <div style="height: 6px; background: var(--accent-color, #175cdd);"></div>
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <span style="font-size: 3rem; color: var(--accent-color, #175cdd);"><i class="bi bi-shield-lock"></i></span>
                <h3 class="mt-2 fw-bold" style="color: var(--heading-color, #112344); font-family: var(--heading-font);">Acceso al Sistema</h3>
                <p class="text-muted small">Ingresa tus credenciales de Sanis para continuar</p>
            </div>
            
            {% if mensaje %}
                <div class="alert alert-danger d-flex align-items-center shadow-sm" role="alert" style="border-radius: 10px; font-size: 0.9rem; border-left: 4px solid #dc3545;">
                    <i class="bi bi-exclamation-triangle-fill me-2 flex-shrink-0" style="font-size: 1.1rem;"></i>
                    <div>
                        {{ mensaje }}
                    </div>
                </div>
            {% endif %}

            <form action="{% url 'login' %}" method="post" id="loginForm" class="needs-validation" novalidate>
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="usuario" class="form-label fw-semibold" style="color: var(--heading-color); font-size: 0.9rem;">Nombre de Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control bg-light border-start-0 ps-0" id="usuario" name="usuario" placeholder="Ej. admin_sanis" required style="font-size: 0.95rem; height: 45px; border-radius: 0 8px 8px 0; border: 1px solid #dee2e6;">
                    </div>
                    <div class="invalid-feedback">
                        Por favor ingrese su nombre de usuario.
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="contraseña" class="form-label fw-semibold" style="color: var(--heading-color); font-size: 0.9rem;">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control bg-light border-start-0 ps-0" id="contraseña" name="contraseña" placeholder="••••••••" required style="font-size: 0.95rem; height: 45px; border-radius: 0 8px 8px 0; border: 1px solid #dee2e6;">
                    </div>
                    <div class="invalid-feedback">
                        Por favor ingrese su contraseña.
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 fw-semibold py-2 shadow-sm" style="background-color: var(--accent-color); border: none; border-radius: 8px; transition: all 0.3s ease; height: 45px;">
                    Iniciar Sesión
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    (function () {
      'use strict'
      var forms = document.querySelectorAll('.needs-validation')
      Array.prototype.slice.call(forms)
        .forEach(function (form) {
          form.addEventListener('submit', function (event) {
            if (!form.checkValidity()) {
              event.preventDefault()
              event.stopPropagation()
            }
            form.classList.add('was-validated')
          }, false)
        })
    })()
</script>

{% include "footer.html" %}
